services:
  # Production-like container (Builds and runs the final standalone JAR)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - meetstudent-network
    restart: no

  # Development container with hot-reload (Maps local code to the container)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    working_dir: /app
    command: ["./mvnw", "spring-boot:run", "-DskipTests"]
    volumes:
      - ./:/app
      - ~/.m2:/root/.m2
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - meetstudent-network
    restart: no

  # Test execution container (Runs all unit and integration tests)
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    working_dir: /app
    command: ["./mvnw", "clean", "verify"]
    volumes:
      - ./:/app
      - ~/.m2:/root/.m2
    environment:
      SPRING_PROFILES_ACTIVE: test
    networks:
      - meetstudent-network
    restart: no

networks:
  meetstudent-network:
    driver: bridge