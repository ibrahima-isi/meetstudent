spring:
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: META-INF/resources/**,static/**,public/**

  datasource:
    # Prioritize Neon/External URL from .env, fallback to local docker-mapped port
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/meetstudent}
    username: ${POSTGRES_USER:ibrahima}
    password: ${POSTGRES_PASSWORD:changeMeInProd!}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        connection:
          autocommit: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:devSecretKeyForLocalOnly!1234567890}
