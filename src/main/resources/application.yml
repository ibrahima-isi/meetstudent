spring:
  application:
    name: meetstudent
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
  show-actuator: true

file:
  upload-dir: uploads

logging:
  level:
    root: INFO
    com.bowe.meetstudent: DEBUG
